<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="kanban.css" />
  </head>
  <body>
    <img alt="image" src="images/f.webp" class="classImage" />
    <div class="classDiv">
      <p class="mainTitle">Kanban Board</p>

      <div class="classAll">
        <div class="classOne">
          <div class="classBoard"></div>
          <div
            class="classContent"
            ondrop="drop(event , 0)"
            ondragover="allowDrop(event , 0)"
          ></div>
          <div class="btnAdd">
            <p class="classAdd">+ add Item</p>
          </div>
          <div class="classForInput">
            <div class="save">
              <p class="classSave">Save Item</p>
            </div>
            <textarea cols="40" rows="5" class="classInput"></textarea>
          </div>
        </div>
        <div class="classOne">
          <div class="classBoard"></div>
          <div
            class="classContent"
            ondrop="drop(event , 1)"
            ondragover="allowDrop(event , 1)"
          ></div>
          <div class="btnAdd">
            <p class="classAdd">+ add Item</p>
          </div>
          <div class="classForInput">
            <div class="save">
              <p class="classSave">Save Item</p>
            </div>
            <textarea cols="40" rows="5" class="classInput"></textarea>
          </div>
        </div>
        <div class="classOne">
          <div class="classBoard"></div>
          <div
            class="classContent"
            ondrop="drop(event , 2)"
            ondragover="allowDrop(event , 2)"
          ></div>
          <div class="btnAdd">
            <p class="classAdd">+ add Item</p>
          </div>
          <div class="classForInput">
            <div class="save">
              <p class="classSave">Save Item</p>
            </div>
            <textarea cols="40" rows="5" class="classInput"></textarea>
          </div>
        </div>
        <div class="classOne">
          <div class="classBoard"></div>
          <div
            class="classContent"
            ondrop="drop(event , 3)"
            ondragover="allowDrop(event , 3)"
          ></div>
          <div class="btnAdd">
            <p class="classAdd">+ add Item</p>
          </div>
          <div class="classForInput">
            <div class="save">
              <p class="classSave">Save Item</p>
            </div>
            <textarea cols="40" rows="5" class="classInput"></textarea>
          </div>
        </div>
      </div>
    </div>

    <script src="kanban.js"></script>
  </body>
</html>
