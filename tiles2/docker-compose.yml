version: '3.8'

services:
  backend:
    build: ./backend-nestjs
    ports:
      - "3000:3000"        # מחשב מקומי ל-backend
    networks:
      - app-network

  frontend:
    build: ./web
    ports:
      - "5173:5173"        # מחשב מקומי ל-frontend
    environment:
      - VITE_BASE_URL=http://localhost:3000
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge